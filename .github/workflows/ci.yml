name: ci

env:
  HOMEBREW_NO_INSTALL_CLEANUP: 1

on:
  push:
    paths:
      - "**.c"
      - "**.cpp"
      - "**.f90"
      - "**/CMakeLists.txt"
      - "**.cmake"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ubuntu26:
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    strategy:
      matrix:
        gcc-version: [15]

    env:
      CC: gcc-${{ matrix.gcc-version }}
      CXX: g++-${{ matrix.gcc-version }}
      FC: gfortran-${{ matrix.gcc-version }}

    steps:
    - &checkout
      uses: actions/checkout@v6

    - uses: ./.github/workflows/composite-action


  ubuntu24:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      matrix:
        gcc-version: [11, 12, 13, 14]

    env:
      CC: gcc-${{ matrix.gcc-version }}
      CXX: g++-${{ matrix.gcc-version }}
      FC: gfortran-${{ matrix.gcc-version }}

    steps:
    - name: GCC APT
      if: matrix.gcc-version < 12
      run: |
        sudo apt update -y
        sudo apt install -y --no-install-recommends gcc-${{ matrix.gcc-version }} g++-${{ matrix.gcc-version }} gfortran-${{ matrix.gcc-version }}

    - *checkout

    - uses: ./.github/workflows/composite-action


  linux-clang:
    runs-on: ubuntu-26.04
    timeout-minutes: 15

    strategy:
      matrix:
        clang-version: [22]

    env:
      CC: clang-${{ matrix.clang-version }}
      CXX: clang++-${{ matrix.clang-version }}

    steps:
    - *checkout
    - uses: ./.github/workflows/composite-action


  mac:
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      matrix:
        compiler: [ {cpp: clang++, c: clang},
                    {cpp: g++-15, c: gcc-15} ]

    env:
      CC: ${{ matrix.compiler.c }}
      CXX: ${{ matrix.compiler.cpp }}
      FC: gfortran-15

    steps:
    - *checkout

    - uses: ./.github/workflows/composite-action


  windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc-fortran

    - name: Put MSYS2_MinGW64 on PATH
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - *checkout

    - name: Debug workflow
      run: cmake --workflow debug

    - name: Release workflow
      run: cmake --workflow release
